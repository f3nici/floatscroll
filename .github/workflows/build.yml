name: Build Debug APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: floatscroll-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 90

      # On push to main, also create/update a GitHub Release with the APK
      - name: Get short SHA
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Create release with APK
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ steps.sha.outputs.short }}
          name: Debug Build ${{ steps.sha.outputs.short }}
          body: |
            Automated debug build from commit ${{ github.sha }}
          files: app/build/outputs/apk/debug/app-debug.apk
          make_latest: true
